<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>College Companion</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <h1>College Companion</h1>
        <p>Track classes, assignments, and your day in one place.</p>
      </header>

      <section class="grid">
        <article class="card">
          <h2>Today's Timetable</h2>
          <ul id="timetable" class="list"></ul>
        </article>

        <article class="card">
          <h2>Add Assignment</h2>
          <form id="assignmentForm" class="form">
            <label>
              Title
              <input id="titleInput" type="text" placeholder="e.g. Database Lab Report" required />
            </label>
            <label>
              Due Date
              <input id="dueDateInput" type="date" required />
            </label>
            <button type="submit">Add</button>
          </form>
        </article>

        <article class="card">
          <h2>AI College Study Coach</h2>
          <form id="aiForm" class="form">
            <label>
              Course
              <input id="subjectInput" list="subjectSuggestions" type="text" placeholder="e.g. Chemistry" required />
            </label>
              <datalist id="subjectSuggestions">
                <option value="Chemistry"></option>
                <option value="Botany"></option>
                <option value="Zoology"></option>
                <option value="Mathematics"></option>
                <option value="Physics"></option>
                <option value="English"></option>
                <option value="Biology"></option>
              </datalist>
            <label>
              Topic to Learn
              <input id="topicInput" type="text" placeholder="e.g. Trees and Graph Traversal" required />
            </label>
            <label>
              Goal Type
              <select id="goalInput" required>
                <option value="exam">Exam Prep</option>
                <option value="assignment">Assignment Work</option>
                <option value="revision">Lecture Revision</option>
              </select>
            </label>
            <label>
              Plan Start Date
              <input id="startDateInput" type="date" required />
            </label>
            <label>
              Time Available (minutes)
              <input id="timeInput" type="number" min="10" max="240" step="5" value="60" required />
            </label>
            <button type="submit">Generate Step-by-Step Plan</button>
          </form>
          <div id="aiOutput" class="ai-output" aria-live="polite">
            Add your course and topic to get a college-focused step-by-step study plan.
          </div>
        </article>

        <article class="card full-width">
          <div class="card-header">
            <h2>Assignments</h2>
            <span id="assignmentCount" class="badge">0 pending</span>
          </div>
          <ul id="assignmentList" class="list"></ul>
        </article>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
